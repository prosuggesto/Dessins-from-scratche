<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sketch Board — Tableau de Dessin</title>
    <meta name="description" content="Tableau de dessin minimaliste pour croquis vidéo">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ═══════════════ TOOLBAR ═══════════════ -->
    <header id="toolbar">
        <div class="toolbar-left">
            <button id="btn-undo" class="tool-btn" title="Annuler (Ctrl+Z)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 10h13a4 4 0 0 1 0 8H7" />
                    <polyline points="7 6 3 10 7 14" />
                </svg>
            </button>
            <button id="btn-redo" class="tool-btn" title="Rétablir (Ctrl+Shift+Z)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10H8a4 4 0 0 0 0 8h9" />
                    <polyline points="17 6 21 10 17 14" />
                </svg>
            </button>
            <div class="toolbar-divider"></div>
            <button id="btn-clear" class="tool-btn" title="Tout effacer">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                    <path d="M10 11v6" />
                    <path d="M14 11v6" />
                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                </svg>
            </button>
            <button id="btn-save" class="tool-btn tool-btn--accent" title="Sauvegarder (Ctrl+S)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                    <polyline points="17 21 17 13 7 13 7 21" />
                    <polyline points="7 3 7 8 15 8" />
                </svg>
                <span class="btn-label">Save</span>
            </button>
        </div>

        <div class="toolbar-center">
            <div class="brush-control">
                <span class="brush-label">Taille</span>
                <input type="range" id="brush-slider" min="2" max="18" value="4" step="1">
                <span id="brush-size-display" class="brush-value">4</span>
            </div>
            <div class="toolbar-divider"></div>
            <div class="zoom-control">
                <button id="btn-zoom-out" class="tool-btn" title="Dézoomer (Ctrl+-)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                </button>
                <span id="zoom-level" class="zoom-value" title="Double-cliquez pour réinitialiser">100%</span>
                <button id="btn-zoom-in" class="tool-btn" title="Zoomer (Ctrl++)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="11" y1="8" x2="11" y2="14" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                </button>
                <button id="btn-zoom-reset" class="tool-btn" title="Réinitialiser zoom">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                </button>
            </div>
            <div class="toolbar-divider"></div>
            <div id="active-indicator">
                <span id="active-color-dot"></span>
            </div>
        </div>

        <div class="toolbar-right">
            <button id="btn-history" class="tool-btn" title="Historique">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                <span class="btn-label">Historique</span>
            </button>
        </div>
    </header>

    <!-- ═══════════════ CANVAS ═══════════════ -->
    <main id="canvas-container">
        <canvas id="draw-canvas"></canvas>
    </main>

    <!-- ═══════════════ PALETTE ═══════════════ -->
    <footer id="palette">
        <div id="palette-colors">
            <!-- generated by palette.js -->
        </div>
        <div class="palette-divider"></div>
        <div id="text-controls">
            <span class="text-controls-label">Texte</span>
            <select id="text-font-select" title="Police">
                <option value="Inter">Inter</option>
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier New</option>
                <option value="Comic Sans MS">Comic Sans</option>
                <option value="Verdana">Verdana</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Trebuchet MS">Trebuchet MS</option>
                <option value="Impact">Impact</option>
                <option value="Palatino">Palatino</option>
            </select>
            <input type="number" id="text-size-input" min="8" max="200" value="24" title="Taille (px)">
        </div>
    </footer>

    <!-- ═══════════════ TEXT EDIT POPUP ═══════════════ -->
    <div id="text-edit-popup" class="text-edit-popup-hidden">
        <div class="text-edit-popup-arrow"></div>
        <input type="text" id="text-edit-value" placeholder="Modifier le texte…" autocomplete="off" maxlength="200">
        <div class="text-edit-row">
            <select id="text-edit-font" title="Police">
                <option value="Inter">Inter</option>
                <option value="Arial">Arial</option>
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier New</option>
                <option value="Comic Sans MS">Comic Sans</option>
                <option value="Verdana">Verdana</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Trebuchet MS">Trebuchet MS</option>
                <option value="Impact">Impact</option>
                <option value="Palatino">Palatino</option>
            </select>
            <input type="number" id="text-edit-size" min="8" max="200" value="24" title="Taille">
            <input type="color" id="text-edit-color" value="#ffffff" title="Couleur">
        </div>
        <div class="text-edit-actions">
            <button id="text-edit-delete" class="modal-btn modal-btn--ghost text-edit-btn" title="Supprimer">🗑</button>
            <button id="text-edit-ok" class="modal-btn modal-btn--primary text-edit-btn">OK</button>
        </div>
    </div>
    <aside id="history-panel" class="panel-hidden">
        <div class="panel-header">
            <div class="panel-header-title">
                <h2>Historique</h2>
                <button id="btn-export-mode" class="tool-btn" title="Mode export / sélection">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                </button>
            </div>
            <div class="panel-header-actions">
                <button id="btn-close-history" class="tool-btn" title="Fermer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
        </div>
        <div id="history-list" class="panel-body">
            <p class="empty-state">Aucun dessin sauvegardé</p>
        </div>
    </aside>

    <!-- ═══════════════ SAVE MODAL ═══════════════ -->
    <div id="save-modal" class="modal-overlay modal-hidden">
        <div class="modal-card">
            <h3>Sauvegarder le dessin</h3>
            <input type="text" id="save-name-input" placeholder="Nom du dessin…" autocomplete="off" maxlength="60">
            <div class="modal-actions">
                <button id="modal-cancel" class="modal-btn modal-btn--ghost">Annuler</button>
                <button id="modal-confirm" class="modal-btn modal-btn--primary">Sauvegarder</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════ CONFIRM MODAL ═══════════════ -->
    <div id="confirm-modal" class="modal-overlay modal-hidden">
        <div class="modal-card">
            <h3 id="confirm-title">Confirmation</h3>
            <p id="confirm-message">Êtes-vous sûr ?</p>
            <div class="modal-actions">
                <button id="confirm-cancel" class="modal-btn modal-btn--ghost">Annuler</button>
                <button id="confirm-ok" class="modal-btn modal-btn--danger">Confirmer</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════ RENAME MODAL ═══════════════ -->
    <div id="rename-modal" class="modal-overlay modal-hidden">
        <div class="modal-card">
            <h3>Renommer</h3>
            <input type="text" id="rename-input" placeholder="Nouveau nom…" autocomplete="off" maxlength="60">
            <div class="modal-actions">
                <button id="rename-cancel" class="modal-btn modal-btn--ghost">Annuler</button>
                <button id="rename-confirm" class="modal-btn modal-btn--primary">Renommer</button>
            </div>
        </div>
    </div>

    <!-- JS Modules -->
    <script src="js/canvas.js"></script>
    <script src="js/export.js"></script>
    <script src="js/palette.js"></script>
    <script src="js/toolbar.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/history.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
